name: Release Desktop (JVM)

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run JVM tests
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
        run: ./gradlew :composeApp:jvmTest

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            task: packageReleaseDmg
            ext: dmg
          - os: windows-latest
            task: packageReleaseMsi
            ext: msi
          - os: ubuntu-latest
            task: packageReleaseDeb
            ext: deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build ${{ matrix.ext }} installer
        shell: bash
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./gradlew :composeApp:${{ matrix.task }} -Pcef.versionName="$VERSION"
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.ext }}
          path: composeApp/build/compose/binaries/**/*.${{ matrix.ext }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.msi
            dist/*.deb
