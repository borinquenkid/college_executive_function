services:
  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    container_name: cef-openobserve
    restart: unless-stopped
    environment:
      ZO_ROOT_USER_EMAIL: ${CEF_OTLP_USER:-root@local.dev}
      ZO_ROOT_USER_PASSWORD: ${CEF_OTLP_PASSWORD:-Oficio_dev_2026}
      ZO_DATA_DIR: /data
    ports:
      - "5428:5080"   # host:container — UI: http://localhost:5428, OTLP: http://localhost:5428/api/default/v1/traces
    volumes:
      - openobserve-data:/data

volumes:
  openobserve-data:
